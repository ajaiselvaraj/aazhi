version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_stress
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - stress_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_stress
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboards:/var/lib/grafana/dashboards
    networks:
      - stress_network
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter_stress
    ports:
      - "9100:9100"
    networks:
      - stress_network

networks:
  stress_network:
    driver: bridge

volumes:
  grafana_data:
